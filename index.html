```html
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morena Rosa - Sistema</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
}

/* LOGIN */
.login {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-box {
    background: #1c1c1c;
    padding: 30px;
    border-radius: 15px;
    width: 300px;
    text-align: center;
}

.login-box input {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
    background: #333;
    border: none;
    color: white;
}

.login-box button {
    background: #ff4da6;
    border: none;
    padding: 10px;
    width: 100%;
    color: white;
}

/* APP */
.app {
    display: none;
}

/* MENU */
.sidebar {
    width: 220px;
    background: #111;
    height: 100vh;
    position: fixed;
    padding: 20px;
}

.sidebar h2 {
    color: #ff4da6;
}

.sidebar button {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border: none;
    background: #ff4da6;
    color: white;
    cursor: pointer;
}

/* MAIN */
.main {
    margin-left: 240px;
    padding: 20px;
}

/* CARD */
.card {
    background: #1c1c1c;
    padding: 15px;
    border-radius: 10px;
    margin: 10px 0;
}

/* INPUT */
input, select {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    background: #333;
    border: none;
    color: white;
}

/* BOTÃO */
.btn {
    background: #ff4da6;
    border: none;
    padding: 10px;
    color: white;
}

/* CHAT */
.chat-box {
    background: #1c1c1c;
    height: 250px;
    overflow-y: auto;
    padding: 10px;
    border-radius: 10px;
}

.msg-user {
    text-align: right;
    color: #ff4da6;
}

.msg-bot {
    text-align: left;
    color: #ccc;
}

/* SECTIONS */
.section {
    display: none;
}
.active {
    display: block;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="loginTela">
    <div class="login-box">
        <h2>Morena Rosa</h2>
        <input id="user" placeholder="Usuário">
        <input id="pass" type="password" placeholder="Senha">
        <button onclick="login()">Entrar</button>
    </div>
</div>

<!-- APP -->
<div class="app" id="app">

<div class="sidebar">
<h2>Morena</h2>
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('cadastro')">Novo Pedido</button>
<button onclick="show('pedidos')">Pedidos</button>
<button onclick="show('rastreio')">Rastreio</button>
<button onclick="show('chat')">Chat</button>
<button onclick="logout()">Sair</button>
</div>

<div class="main">

<div id="dashboard" class="section active">
<h1>Painel</h1>
<div class="card">Total de pedidos: <span id="total">0</span></div>
</div>

<div id="cadastro" class="section">
<h1>Novo Pedido</h1>
<input id="nome" placeholder="Cliente">
<input id="codigo" placeholder="Código">
<select id="status">
<option>Em preparo</option>
<option>Enviado</option>
<option>Entregue</option>
</select>
<button class="btn" onclick="addPedido()">Cadastrar</button>
</div>

<div id="pedidos" class="section">
<h1>Pedidos</h1>
<div id="lista"></div>
</div>

<div id="rastreio" class="section">
<h1>Rastrear Pedido</h1>
<input id="buscar">
<button class="btn" onclick="buscarPedido()">Buscar</button>
<p id="resultado"></p>
</div>

<div id="chat" class="section">
<h1>Atendimento</h1>

<div class="chat-box" id="chatBox"></div>

<input id="msg" placeholder="Digite sua mensagem">
<button class="btn" onclick="enviar()">Enviar</button>

</div>

</div>

</div>

<script>

let pedidos = [];

/* LOGIN */
function login(){
    let user = document.getElementById("user").value;
    let pass = document.getElementById("pass").value;

    if(user === "admin" && pass === "123"){
        document.getElementById("loginTela").style.display = "none";
        document.getElementById("app").style.display = "block";
    } else {
        alert("Login inválido");
    }
}

function logout(){
    location.reload();
}

/* NAV */
function show(sec){
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.getElementById(sec).classList.add('active');
}

/* PEDIDOS */
function addPedido(){
    let nome = document.getElementById("nome").value;
    let codigo = document.getElementById("codigo").value;
    let status = document.getElementById("status").value;

    pedidos.push({nome, codigo, status});
    atualizar();
}

function atualizar(){
    let lista = document.getElementById("lista");
    lista.innerHTML = "";

    pedidos.forEach(p=>{
        lista.innerHTML += `
        <div class="card">
            <b>${p.nome}</b><br>
            Código: ${p.codigo}<br>
            Status: ${p.status}
        </div>`;
    });

    document.getElementById("total").innerText = pedidos.length;
}

/* RASTREIO */
function buscarPedido(){
    let cod = document.getElementById("buscar").value;
    let p = pedidos.find(x=>x.codigo == cod);

    if(p){
        document.getElementById("resultado").innerText = p.status;
    } else {
        document.getElementById("resultado").innerText = "Pedido não encontrado";
    }
}

/* CHAT */
function enviar(){
    let msg = document.getElementById("msg").value.toLowerCase();
    let chat = document.getElementById("chatBox");

    chat.innerHTML += `<p class="msg-user">Você: ${msg}</p>`;

    let resp = "Não entendi. Tente 'prazo', 'troca' ou 'pedido'.";

    if(msg.includes("prazo")) resp = "O prazo é de 5 a 10 dias úteis.";
    if(msg.includes("troca")) resp = "Trocas em até 7 dias.";
    if(msg.includes("pedido")) resp = "Verifique na aba pedidos.";

    chat.innerHTML += `<p class="msg-bot">Bot: ${resp}</p>`;
}

</script>

</body>
</html>
